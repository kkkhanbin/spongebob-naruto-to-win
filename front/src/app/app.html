<div class="shell">
  <header class="topbar">
    <a class="brand" routerLink="/">
      <span class="brand__badge">LO</span>
      <div>
        <strong>{{ title() }}</strong>
        <p>Premium Gaming Network</p>
      </div>
    </a>

    <nav class="nav">
      @for (item of navItems; track item.path) {
        <a 
          routerLinkActive="active" 
          [routerLinkActiveOptions]="{ exact: item.path === '/' }" 
          [routerLink]="item.path">
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="actions">
      @if (!authService.isLoggedIn()) {
        <a class="button button--ghost" routerLink="/login">Sign In</a>
      } @else {
        <button class="button button--danger" type="button" (click)="logout()">Sign Out</button>
      }
    </div>
  </header>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
